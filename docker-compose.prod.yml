# ===========================================
# KPI Management System — Production Stack
# (Client-Side Config for Central Proxy)
# ===========================================

services:

  # ─── PostgreSQL Database ──────────────────
  postgres:
    image: postgres:16-alpine
    container_name: kpi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hris_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hris_password}
      POSTGRES_DB: ${POSTGRES_DB:-hris_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-hris_user} -d ${POSTGRES_DB:-hris_db}' ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kpi-internal

  # ─── Redis ────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: kpi-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ 'CMD', 'redis-cli', 'ping' ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kpi-internal

  # ─── Backend (NestJS API) ─────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kpi-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://hris_user:hris_password@postgres:5432/hris_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-super-secret-key-change-in-production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-24h}
      PORT: 3001
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kpi-internal
      - web-gateway # Agar bisa dijangkau oleh Global Caddy

  # ─── Frontend (Next.js) ───────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    container_name: kpi-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - kpi-internal
      - web-gateway # Agar bisa dijangkau oleh Global Caddy

networks:
  # Network internal agar app bisa chat dengan DB/Redis tanpa gangguan luar
  kpi-internal:
    driver: bridge
  # Network eksternal untuk jembatan ke Caddy Pusat
  web-gateway:
    external: true

volumes:
  postgres_data:
  redis_data: